<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloRun 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #title-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #title-screen h1 {
        margin: 0;
        font-weight: 300;
        font-size: clamp(2rem, 6vw, 4.5rem);
      }
      #title-screen .subtitle {
        margin-top: 1.5rem;
        opacity: 0.65;
        font-size: clamp(0.75rem, 1.4vw, 1rem);
      }
      #drop-zone {
        padding: 1rem 2.25rem;
        border: 1px dashed rgba(0, 170, 255, 0.55);
        border-radius: 2px;
        opacity: 0.65;
        transition: opacity 0.2s, background 0.2s, border-color 0.2s;
        font-size: clamp(0.7rem, 1.3vw, 0.9rem);
        cursor: pointer;
        text-align: center;
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 1;
        background: rgba(0, 170, 255, 0.08);
        border-color: rgba(0, 170, 255, 1);
      }
      .track-list {
        list-style: none;
        margin: 0 0 1rem;
        padding: 0;
        max-height: 14rem;
        overflow-y: auto;
        /* Without explicit overflow-x, `overflow-y: auto` implicitly
           makes overflow-x auto too, so a long-name row would grow a
           horizontal scrollbar. Force hidden — the row layout
           ellipsis-clips long names instead. */
        overflow-x: hidden;
      }
      .track-item {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding: 0.5rem 0.75rem;
        margin-bottom: 0.4rem;
        border: 1px solid rgba(0, 170, 255, 0.25);
        font-size: 0.8rem;
        opacity: 0.65;
        transition: opacity 0.15s, border-color 0.15s, background 0.15s;
      }
      /* Only ready tracks are clickable / hoverable. The in-flight
         (loading, analyzing) and terminal (failed) states stay dim and
         non-interactive — × on user tracks works regardless because
         that button has its own hover styles. */
      .track-item.ready {
        cursor: pointer;
      }
      .track-item.ready:hover {
        opacity: 0.9;
        border-color: rgba(0, 170, 255, 0.55);
      }
      .track-item.loading,
      .track-item.analyzing,
      .track-item.failed {
        opacity: 0.4;
        cursor: default;
      }
      .track-item.failed .track-meta {
        color: #ff6060;
      }
      .track-item.active {
        opacity: 1;
        border-color: rgba(0, 170, 255, 0.85);
        background: rgba(0, 170, 255, 0.08);
      }
      .track-name {
        flex: 1;
        /* `min-width: 0` overrides the flex default of `min-width:
           auto`, which would otherwise keep this span at its content's
           intrinsic width and refuse to honor text-overflow ellipsis. */
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .track-meta {
        opacity: 0.6;
        font-size: 0.7rem;
        white-space: nowrap;
      }
      .track-empty {
        padding: 0.5rem 0.75rem;
        opacity: 0.4;
        font-size: 0.75rem;
      }
      .track-delete {
        background: transparent;
        color: rgba(0, 170, 255, 0.55);
        border: 1px solid rgba(0, 170, 255, 0.3);
        width: 1.5rem;
        height: 1.5rem;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .track-delete:hover {
        color: rgba(0, 170, 255, 1);
        border-color: rgba(0, 170, 255, 0.85);
        background: rgba(0, 170, 255, 0.08);
      }
      .track-edit {
        background: transparent;
        color: rgba(0, 170, 255, 0.55);
        border: 1px solid rgba(0, 170, 255, 0.3);
        width: 1.5rem;
        height: 1.5rem;
        font: inherit;
        font-size: 0.85rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .track-edit:hover {
        color: rgba(0, 170, 255, 1);
        border-color: rgba(0, 170, 255, 0.85);
        background: rgba(0, 170, 255, 0.08);
      }
      /* Track editor modal — opens on top of the music tab when the
         user clicks ✎ on a track row. Z-index above the menu (20) but
         below sync-flash (100). */
      #track-editor {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.65);
        color: #00aaff;
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0;
        z-index: 50;
      }
      #track-editor.hidden { display: none; }
      .editor-modal {
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.92);
        border: 1px dashed rgba(0, 170, 255, 0.55);
        width: min(90vw, 60rem);
        max-height: 90vh;
      }
      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px dashed rgba(0, 170, 255, 0.35);
      }
      .editor-header h2 {
        margin: 0;
        font-weight: 300;
        font-size: 0.95rem;
        opacity: 0.9;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .editor-close {
        background: transparent;
        color: #00aaff;
        border: 1px solid rgba(0, 170, 255, 0.55);
        width: 1.75rem;
        height: 1.75rem;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
      }
      .editor-close:hover {
        background: rgba(0, 170, 255, 0.12);
        border-color: rgba(0, 170, 255, 1);
      }
      .editor-meta {
        display: flex;
        gap: 1.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .editor-meta-field {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
      }
      .editor-meta-field .label {
        opacity: 0.55;
      }
      .editor-meta-field input {
        background: transparent;
        color: #00aaff;
        border: 1px solid rgba(0, 170, 255, 0.55);
        font: inherit;
        font-size: 0.85rem;
        padding: 0.25rem 0.5rem;
        width: 5rem;
        text-align: right;
        text-transform: none;
      }
      .editor-meta-field input:focus {
        outline: none;
        border-color: rgba(0, 170, 255, 1);
      }
      .editor-meta-field .value {
        opacity: 0.85;
      }
      .editor-canvas-wrap {
        padding: 1rem 1.5rem;
        flex: 1;
        min-height: 14rem;
        display: flex;
      }
      #editor-waveform {
        display: block;
        width: 100%;
        height: 14rem;
        background: rgba(0, 30, 60, 0.4);
        border: 1px solid rgba(0, 170, 255, 0.35);
        cursor: crosshair;
      }
      .editor-help {
        padding: 0 1.5rem 0.75rem;
        font-size: 0.7rem;
        opacity: 0.5;
      }
      .editor-footer {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        padding: 1rem 1.5rem;
        border-top: 1px dashed rgba(0, 170, 255, 0.35);
      }
      .editor-footer button {
        background: transparent;
        color: #00aaff;
        border: 1px solid rgba(0, 170, 255, 0.55);
        font: inherit;
        font-size: 0.85rem;
        padding: 0.5rem 1.25rem;
        cursor: pointer;
        text-transform: uppercase;
        transition: background 0.15s, border-color 0.15s;
      }
      .editor-footer button:hover {
        background: rgba(0, 170, 255, 0.12);
        border-color: rgba(0, 170, 255, 1);
      }
      .editor-footer .save-btn {
        background: rgba(0, 170, 255, 0.1);
      }
      #title-screen.hidden {
        display: none;
      }
      /* Sync flash: full-viewport white overlay that pulses on
         beat-resync (LMB during active play). The peak-and-decay hides
         the snap-cut between the old and new corridor layouts.
         pointer-events:none so it never intercepts clicks; high
         z-index so it sits above menu and waveform. */
      #sync-flash {
        position: fixed;
        inset: 0;
        background: #fff;
        pointer-events: none;
        opacity: 0;
        z-index: 100;
      }
      #sync-flash.flashing {
        animation: sync-flash 300ms ease-out;
      }
      @keyframes sync-flash {
        0% { opacity: 0.85; }
        100% { opacity: 0; }
      }
      /* User menu — top-right hamburger toggle + tabbed modal. Sits
         above the user-menu modal (z-index 22 vs 20) so the hamburger
         doubles as the close affordance when the menu is open. */
      #menu-button {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(0, 170, 255, 0.55);
        cursor: pointer;
        z-index: 22;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        padding: 0;
        transition: border-color 0.15s, background 0.15s;
      }
      #menu-button:hover {
        border-color: rgba(0, 170, 255, 1);
        background: rgba(0, 0, 0, 0.75);
      }
      #menu-button span {
        display: block;
        width: 1.25rem;
        height: 2px;
        background: #00aaff;
      }
      #menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0;
        z-index: 20;
      }
      #menu.hidden { display: none; }
      .user-modal {
        display: flex;
        background: rgba(0, 0, 0, 0.85);
        border: 1px dashed rgba(0, 170, 255, 0.55);
        min-width: 32rem;
        min-height: 18rem;
      }
      .user-tabs {
        display: flex;
        flex-direction: column;
        border-right: 1px dashed rgba(0, 170, 255, 0.35);
        min-width: 9rem;
      }
      .user-tab {
        background: transparent;
        color: #00aaff;
        border: 0;
        border-bottom: 1px dashed rgba(0, 170, 255, 0.2);
        padding: 0.85rem 1.5rem;
        text-align: left;
        font: inherit;
        text-transform: uppercase;
        letter-spacing: inherit;
        cursor: pointer;
        opacity: 0.55;
        transition: opacity 0.15s, background 0.15s;
      }
      .user-tab:hover { opacity: 1; }
      .user-tab.active {
        opacity: 1;
        background: rgba(0, 170, 255, 0.1);
      }
      .user-panes {
        flex: 1;
        padding: 1.5rem 2rem;
      }
      .user-pane { display: none; }
      .user-pane.active { display: block; }
      /* Direct-child only — nested controls (like .track-delete inside
         a list row) need their own sizing and shouldn't inherit the
         100%-wide placeholder action-button style. */
      .user-pane > button {
        display: block;
        width: 100%;
        margin: 0.5rem 0;
        padding: 0.6rem 1.25rem;
        background: transparent;
        color: #00aaff;
        border: 1px solid rgba(0, 170, 255, 0.55);
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .user-pane > button:hover {
        background: rgba(0, 170, 255, 0.12);
        border-color: rgba(0, 170, 255, 1);
      }
    </style>
  </head>
  <body>
    <div id="title-screen">
      <h1>HELLO RUN</h1>
      <p class="subtitle">loading audio…</p>
    </div>
    <input type="file" id="file-picker" accept="audio/*" hidden />
    <div id="sync-flash"></div>
    <div id="track-editor" class="hidden">
      <div class="editor-modal">
        <header class="editor-header">
          <h2 id="editor-name">track name</h2>
          <button id="editor-close" type="button" aria-label="close">×</button>
        </header>
        <div class="editor-meta">
          <div class="editor-meta-field">
            <span class="label">bpm</span>
            <input
              id="editor-bpm"
              type="number"
              step="0.01"
              min="40"
              max="208"
            />
          </div>
          <div class="editor-meta-field">
            <span class="label">grid offset</span>
            <span id="editor-grid-offset" class="value">0.000s</span>
          </div>
          <div class="editor-meta-field">
            <span class="label">duration</span>
            <span id="editor-duration" class="value">0:00</span>
          </div>
          <div class="editor-meta-field">
            <span class="label">confidence</span>
            <span id="editor-confidence" class="value">0.00</span>
          </div>
        </div>
        <div class="editor-canvas-wrap">
          <canvas id="editor-waveform"></canvas>
        </div>
        <p class="editor-help">
          wheel: zoom · rmb-drag: pan · lmb-click: play from here · lmb-drag: shift beat grid
        </p>
        <footer class="editor-footer">
          <button id="editor-cancel" type="button">cancel</button>
          <button id="editor-save" class="save-btn" type="button">save</button>
        </footer>
      </div>
    </div>
    <button id="menu-button" type="button" aria-label="menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="menu" class="hidden">
      <div class="user-modal">
        <nav class="user-tabs">
          <button class="user-tab active" type="button" data-tab="settings">settings</button>
          <button class="user-tab" type="button" data-tab="music">music</button>
          <button class="user-tab" type="button" data-tab="dev" data-dev-only>dev</button>
        </nav>
        <div class="user-panes">
          <section class="user-pane active" data-pane="settings">
            <button type="button">action one</button>
          </section>
          <section class="user-pane" data-pane="music">
            <ul id="track-list" class="track-list">
              <li class="track-empty">no tracks loaded yet</li>
            </ul>
            <div id="drop-zone">drag mp3 here or click to browse</div>
          </section>
          <section class="user-pane" data-pane="dev" data-dev-only>
            <button id="dev-export-analysis" type="button">export analysis sidecar</button>
            <button id="dev-clear-cache" type="button">clear track analysis</button>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
