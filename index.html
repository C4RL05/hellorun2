<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloRun 2</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #title-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #title-screen h1 {
        margin: 0;
        font-weight: 300;
        font-size: clamp(2rem, 6vw, 4.5rem);
        letter-spacing: 0.5em;
        text-indent: 0.5em;
      }
      #title-screen .subtitle {
        margin-top: 2rem;
        opacity: 0.65;
        letter-spacing: 0.3em;
        font-size: clamp(0.75rem, 1.4vw, 1rem);
      }
      #title-screen.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="title-screen">
      <h1>HELLO RUN</h1>
      <p class="subtitle">loading audio…</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
