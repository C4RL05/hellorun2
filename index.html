<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloRun 2</title>
    <style>
      /* Bundled under SIL Open Font License 1.1 — see public/fonts/OFL.txt.
         "undefined medium" by Andi Rueckel (https://undefined-medium.com). */
      @font-face {
        font-family: "undefined medium";
        src: url("/fonts/undefined-medium.woff2") format("woff2"),
             url("/fonts/undefined-medium.woff") format("woff");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #title-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: "undefined medium", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #title-screen h1 {
        margin: 0;
        font-weight: 300;
        font-size: clamp(2rem, 6vw, 4.5rem);
        /* letter-spacing applies to trailing chars too, nudging the line
           off-center; a matching text-indent compensates. */
        text-indent: 0.2em;
      }
      #title-screen .subtitle {
        margin-top: 1.5rem;
        opacity: 0.65;
        font-size: clamp(0.75rem, 1.4vw, 1rem);
      }
      #drop-zone {
        margin-top: 2rem;
        padding: 1rem 2.25rem;
        border: 1px dashed rgba(0, 170, 255, 0.55);
        border-radius: 2px;
        opacity: 0.65;
        transition: opacity 0.2s, background 0.2s, border-color 0.2s;
        font-size: clamp(0.7rem, 1.3vw, 0.9rem);
        cursor: pointer;
        text-align: center;
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 1;
        background: rgba(0, 170, 255, 0.08);
        border-color: rgba(0, 170, 255, 1);
      }
      #title-screen.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="title-screen">
      <h1>HELLO RUN</h1>
      <p class="subtitle">loading audio…</p>
      <div id="drop-zone">drag mp3 here or click to browse</div>
      <input type="file" id="file-picker" accept="audio/*" hidden />
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
