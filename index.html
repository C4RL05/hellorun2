<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloRun 2</title>
    <style>
      @font-face {
        font-family: "testpattern";
        src: url("/fonts/testpattern.woff2") format("woff2"),
             url("/fonts/testpattern.woff") format("woff");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #title-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: "testpattern", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      #title-screen h1 {
        margin: 0;
        font-weight: 300;
        font-size: clamp(2rem, 6vw, 4.5rem);
      }
      #title-screen .subtitle {
        margin-top: 1.5rem;
        opacity: 0.65;
        font-size: clamp(0.75rem, 1.4vw, 1rem);
      }
      #drop-zone {
        margin-top: 2rem;
        padding: 1rem 2.25rem;
        border: 1px dashed rgba(0, 170, 255, 0.55);
        border-radius: 2px;
        opacity: 0.65;
        transition: opacity 0.2s, background 0.2s, border-color 0.2s;
        font-size: clamp(0.7rem, 1.3vw, 0.9rem);
        cursor: pointer;
        text-align: center;
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 1;
        background: rgba(0, 170, 255, 0.08);
        border-color: rgba(0, 170, 255, 1);
      }
      #title-screen.hidden {
        display: none;
      }
      /* Tab-toggled developer menu (dev-mode only). Modal-style overlay
         above the title screen and waveform. */
      #dev-menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #00aaff;
        font-family: "testpattern", ui-monospace, Menlo, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0;
        z-index: 20;
      }
      #dev-menu.hidden { display: none; }
      .dev-modal {
        background: rgba(0, 0, 0, 0.85);
        border: 1px dashed rgba(0, 170, 255, 0.55);
        padding: 1.5rem 2.25rem;
        min-width: 18rem;
        text-align: center;
      }
      .dev-modal h2 {
        margin: 0 0 1.25rem;
        font-weight: 300;
        font-size: 1rem;
        opacity: 0.65;
      }
      .dev-modal button {
        display: block;
        width: 100%;
        margin: 0.5rem 0;
        padding: 0.6rem 1.25rem;
        background: transparent;
        color: #00aaff;
        border: 1px solid rgba(0, 170, 255, 0.55);
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .dev-modal button:hover {
        background: rgba(0, 170, 255, 0.12);
        border-color: rgba(0, 170, 255, 1);
      }
    </style>
  </head>
  <body>
    <div id="title-screen">
      <h1>HELLO RUN</h1>
      <p class="subtitle">loading audio…</p>
      <div id="drop-zone">drag mp3 here or click to browse</div>
      <input type="file" id="file-picker" accept="audio/*" hidden />
    </div>
    <div id="dev-menu" class="hidden">
      <div class="dev-modal">
        <h2>dev menu</h2>
        <button id="dev-clear-cache">clear track analysis</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
