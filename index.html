<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloRun 2</title>
    <link rel="icon" type="image/svg+xml" href="/images/2.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/images/hellorun2.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;400;500;600&display=swap"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        /* Dark-mode scrollbars. `color-scheme: dark` triggers the
           browser's dark built-in scrollbar rendering on Chromium +
           Firefox; the webkit rules below cover Safari and give
           Chromium a tighter look than the default dark track. */
        color-scheme: dark;
        scrollbar-color: rgba(255, 255, 255, 0.4) rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }
      canvas {
        display: block;
      }
      #title-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.55);
        color: #ffffff;
        font-family: "M PLUS 1", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        z-index: 10;
        cursor: pointer;
        user-select: none;
      }
      /* flex:1 grows to fill leftover space so logo centers in the
         viewport; subtitle's own padding-bottom sticks it to the floor. */
      .title-logo-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #title-logo {
        display: block;
        width: clamp(18rem, 50vw, 40rem);
        height: auto;
        /* Logo is a static element behind the interactive drop-zone /
           subtitle — don't eat click events that belong to the title
           overlay's click-to-start handler. */
        pointer-events: none;
        -webkit-user-drag: none;
        user-select: none;
      }
      #title-screen .subtitle {
        margin: 0;
        padding-bottom: clamp(2rem, 6vh, 5rem);
        opacity: 0.65;
        font-size: clamp(0.875rem, 1.7vw, 1.25rem);
      }
      #drop-zone {
        padding: 1rem 2.25rem;
        border: 1px dashed rgba(255, 255, 255, 0.55);
        border-radius: 2px;
        opacity: 0.65;
        transition: opacity 0.2s, background 0.2s, border-color 0.2s;
        font-size: clamp(0.7rem, 1.3vw, 0.9rem);
        cursor: pointer;
        text-align: center;
      }
      #drop-zone:hover,
      #drop-zone.drag-over {
        opacity: 1;
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 1);
      }
      .track-list {
        list-style: none;
        margin: 0 0 1rem;
        padding: 0;
        max-height: 14rem;
        overflow-y: auto;
        /* Without explicit overflow-x, `overflow-y: auto` implicitly
           makes overflow-x auto too, so a long-name row would grow a
           horizontal scrollbar. Force hidden — the row layout
           ellipsis-clips long names instead. */
        overflow-x: hidden;
      }
      .track-item {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding: 0.5rem 0.75rem;
        margin-bottom: 0.4rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 0.8rem;
        opacity: 0.65;
        transition: opacity 0.15s, border-color 0.15s, background 0.15s;
      }
      /* Only ready tracks are clickable / hoverable. The in-flight
         (loading, analyzing) and terminal (failed) states stay dim and
         non-interactive — × on user tracks works regardless because
         that button has its own hover styles. */
      .track-item.ready {
        cursor: pointer;
      }
      .track-item.ready:hover {
        opacity: 0.9;
        border-color: rgba(255, 255, 255, 0.55);
      }
      .track-item.loading,
      .track-item.analyzing,
      .track-item.failed {
        opacity: 0.4;
        cursor: default;
      }
      .track-item.failed .track-meta {
        color: #ff6060;
      }
      .track-item.active {
        opacity: 1;
        border-color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.08);
      }
      .track-name {
        flex: 1;
        /* `min-width: 0` overrides the flex default of `min-width:
           auto`, which would otherwise keep this span at its content's
           intrinsic width and refuse to honor text-overflow ellipsis. */
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .track-meta {
        opacity: 0.6;
        font-size: 0.7rem;
        white-space: nowrap;
      }
      .track-empty {
        padding: 0.5rem 0.75rem;
        opacity: 0.4;
        font-size: 0.75rem;
      }
      .track-delete {
        background: transparent;
        color: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.3);
        width: 1.5rem;
        height: 1.5rem;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .track-delete:hover {
        color: rgba(255, 255, 255, 1);
        border-color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.08);
      }
      .track-edit {
        background: transparent;
        color: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.3);
        width: 1.5rem;
        height: 1.5rem;
        font: inherit;
        font-size: 0.85rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .track-edit:hover {
        color: rgba(255, 255, 255, 1);
        border-color: rgba(255, 255, 255, 0.85);
        background: rgba(255, 255, 255, 0.08);
      }
      /* Track editor modal — opens on top of the music tab when the
         user clicks ✎ on a track row. Z-index above the menu (20) but
         below sync-flash (100). */
      #track-editor {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.65);
        color: #ffffff;
        font-family: "M PLUS 1", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        z-index: 50;
      }
      #track-editor.hidden { display: none; }
      .editor-modal {
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.92);
        border: 1px dashed rgba(255, 255, 255, 0.55);
        width: min(90vw, 60rem);
        max-height: 90vh;
      }
      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.35);
      }
      .editor-header h2 {
        margin: 0;
        font-weight: 300;
        font-size: 0.95rem;
        opacity: 0.9;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .editor-close {
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.55);
        width: 1.75rem;
        height: 1.75rem;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
      }
      .editor-close:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 1);
      }
      .editor-meta {
        display: flex;
        gap: 1.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .editor-meta-field {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
      }
      .editor-meta-field .label {
        opacity: 0.55;
      }
      .editor-meta-field input {
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.55);
        font: inherit;
        font-size: 0.85rem;
        padding: 0.25rem 0.5rem;
        width: 5rem;
        text-align: right;
        text-transform: none;
      }
      .editor-meta-field input:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 1);
      }
      .editor-meta-field .value {
        opacity: 0.85;
      }
      .editor-canvas-wrap {
        padding: 1rem 1.5rem;
        flex: 1;
        min-height: 14rem;
        display: flex;
      }
      #editor-waveform {
        display: block;
        width: 100%;
        height: 14rem;
        background: rgba(0, 30, 60, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.35);
        cursor: crosshair;
      }
      .editor-help {
        padding: 0 1.5rem 0.75rem;
        font-size: 0.7rem;
        opacity: 0.5;
      }
      .editor-footer {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        padding: 1rem 1.5rem;
        border-top: 1px dashed rgba(255, 255, 255, 0.35);
      }
      .editor-footer button {
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.55);
        font: inherit;
        font-size: 0.85rem;
        padding: 0.5rem 1.25rem;
        cursor: pointer;
        text-transform: uppercase;
        transition: background 0.15s, border-color 0.15s;
      }
      .editor-footer button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 1);
      }
      .editor-footer .save-btn {
        background: rgba(255, 255, 255, 0.1);
      }
      #title-screen.hidden {
        display: none;
      }
      /* When the user menu is open, hide the other page chrome so the
         menu modal reads as the sole UI surface. #menu-button stays
         visible (it doubles as the close affordance). */
      body.menu-open #title-screen,
      body.menu-open #waveform-overlay {
        display: none;
      }
      /* Sync flash: full-viewport white overlay that pulses on
         beat-resync (LMB during active play). The peak-and-decay hides
         the snap-cut between the old and new corridor layouts.
         pointer-events:none so it never intercepts clicks; high
         z-index so it sits above menu and waveform. */
      #sync-flash {
        position: fixed;
        inset: 0;
        background: #fff;
        pointer-events: none;
        opacity: 0;
        z-index: 100;
      }
      #sync-flash.flashing {
        animation: sync-flash 300ms ease-out;
      }
      @keyframes sync-flash {
        0% { opacity: 0.85; }
        100% { opacity: 0; }
      }
      /* User menu — top-right hamburger toggle + tabbed modal. Sits
         above the user-menu modal (z-index 22 vs 20) so the hamburger
         doubles as the close affordance when the menu is open. */
      #menu-button {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 2.5rem;
        height: 2.5rem;
        background: transparent;
        border: 0;
        cursor: pointer;
        z-index: 22;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        padding: 0;
        transition: opacity 0.15s;
        opacity: 0.7;
      }
      /* Hidden during initial audio decode/analysis; revealed once the
         first track is ready to play (or has failed to load). */
      body.audio-ready #menu-button {
        display: flex;
      }
      #menu-button:hover {
        opacity: 1;
      }
      #menu-button span {
        display: block;
        width: 1.25rem;
        height: 2px;
        background: #ffffff;
      }
      #menu {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #ffffff;
        font-family: "M PLUS 1", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        z-index: 20;
      }
      #menu.hidden { display: none; }
      .user-modal {
        display: flex;
        background: rgba(0, 0, 0, 0.85);
        border: 1px dashed rgba(255, 255, 255, 0.55);
        width: min(36rem, 90vmin);
        aspect-ratio: 1;
      }
      .user-tabs {
        display: flex;
        flex-direction: column;
        border-right: 1px dashed rgba(255, 255, 255, 0.35);
        min-width: 9rem;
      }
      .user-tab {
        background: transparent;
        color: #ffffff;
        border: 0;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
        padding: 0.85rem 1.5rem;
        text-align: left;
        font: inherit;
        text-transform: uppercase;
        letter-spacing: inherit;
        cursor: pointer;
        opacity: 0.55;
        transition: opacity 0.15s, background 0.15s;
      }
      .user-tab:hover { opacity: 1; }
      .user-tab.active {
        opacity: 1;
        background: rgba(255, 255, 255, 0.1);
      }
      .user-panes {
        flex: 1;
        min-width: 0;
        min-height: 0;
        padding: 1.5rem 2rem;
        overflow: hidden;
      }
      .user-pane {
        display: none;
        height: 100%;
      }
      .user-pane.active { display: block; }
      /* Direct-child only — nested controls (like .track-delete inside
         a list row) need their own sizing and shouldn't inherit the
         100%-wide placeholder action-button style. */
      .user-pane > button {
        display: block;
        width: 100%;
        margin: 0.5rem 0;
        padding: 0.6rem 1.25rem;
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.55);
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .user-pane > button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 1);
      }
      /* Square checkbox-style toggle. Empty when aria-pressed=false,
         filled when true. justify-self: start keeps it from stretching
         to fill the grid cell. */
      .settings-toggle {
        justify-self: start;
        width: 1rem;
        height: 1rem;
        padding: 0;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.35);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .settings-toggle:hover {
        border-color: rgba(255, 255, 255, 0.85);
      }
      .settings-toggle[aria-pressed="true"] {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(255, 255, 255, 0.85);
      }
      /* Post panel: dense list of numeric rows + a small button row at
         the bottom. Scrolls within the pane when the full list
         overflows a narrow menu. */
      .post-panel {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        max-height: 100%;
        overflow-y: auto;
        /* stable scrollbar gutter so content doesn't shift by ~10px
           when the scrollbar appears/disappears on tall content. */
        scrollbar-gutter: stable;
        padding-right: 0.5rem;
        /* Bottom padding keeps the last button off the scroll-area
           edge — without it, hover-induced subpixel reflows can clip
           the bottom border at short viewports. */
        padding-bottom: 0.5rem;
        font-size: 0.75rem;
        text-transform: none;
        letter-spacing: 0;
      }
      .post-section-header {
        margin-top: 0.75rem;
        padding-bottom: 0.15rem;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        opacity: 0.65;
        font-size: 0.7rem;
      }
      .post-section-header:first-child { margin-top: 0; }
      .post-row {
        display: grid;
        grid-template-columns: 11rem minmax(0, 1fr);
        align-items: center;
        gap: 0.75rem;
      }
      .post-row label {
        opacity: 0.7;
      }
      .post-row label::first-letter {
        text-transform: uppercase;
      }
      .post-row select {
        background: #0a0a0a;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.35);
        font: inherit;
        font-size: 0.75rem;
        padding: 0.2rem 0.4rem;
        width: 100%;
        box-sizing: border-box;
        text-transform: none;
      }
      .post-row select:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.85);
      }
      /* Native <option> elements render through the OS popup on Chrome/
         Windows and don't inherit transparent select colors. Force
         explicit background+color so the list is readable when open. */
      .post-row select option {
        background: #0a0a0a;
        color: #ffffff;
      }
      .post-row select option:checked {
        background: #1a1a1a;
      }
      /* Custom horizontal stepper: < [input] > with transparent
         chevron buttons. Native browser spinners are hidden. */
      .post-number {
        display: flex;
        align-items: stretch;
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      .post-number:focus-within {
        border-color: rgba(255, 255, 255, 0.85);
      }
      .post-number input[type="number"] {
        flex: 1;
        min-width: 0;
        background: transparent;
        color: #ffffff;
        border: 0;
        font: inherit;
        font-size: 0.75rem;
        padding: 0.2rem 0.4rem;
        text-align: left;
        text-transform: none;
        -moz-appearance: textfield;
      }
      .post-number input[type="number"]:focus {
        outline: none;
      }
      .post-number input[type="number"]::-webkit-inner-spin-button,
      .post-number input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .post-step {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: #ffffff;
        border: 0;
        cursor: pointer;
        padding: 0 0.35rem;
        font: inherit;
        font-size: 0.8rem;
        line-height: 1;
        opacity: 0.45;
        transition: opacity 0.12s;
        user-select: none;
        transform: translateY(-2px);
      }
      /* `<` (the .post-step that has another .post-step after it) gets a
         margin-right so it sits visibly apart from `>` instead of bumping
         straight into it. `>` keeps the outer edge tight against the box. */
      .post-step:has(+ .post-step) {
        padding-right: 0.1rem;
        margin-right: 0.2rem;
      }
      .post-step + .post-step {
        padding-left: 0.1rem;
        margin-right: 0.2rem;
      }
      .post-step:hover { opacity: 1; }
      .post-step:active { opacity: 0.7; }
      .post-vec3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.4rem;
      }
      .post-buttons {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.4rem;
      }
      .post-buttons button {
        flex: 1;
        background: transparent;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.55);
        font: inherit;
        font-size: 0.75rem;
        padding: 0.4rem 0.6rem;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: background 0.15s, border-color 0.15s;
      }
      .post-buttons button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 1);
      }
    </style>
  </head>
  <body>
    <div id="title-screen">
      <div class="title-logo-wrap">
        <img id="title-logo" src="/images/hellorun2.svg" alt="HelloRun 2" />
      </div>
      <p class="subtitle">loading audio…</p>
    </div>
    <input type="file" id="file-picker" accept="audio/*" hidden />
    <div id="sync-flash"></div>
    <div id="track-editor" class="hidden">
      <div class="editor-modal">
        <header class="editor-header">
          <h2 id="editor-name">track name</h2>
          <button id="editor-close" type="button" aria-label="close">×</button>
        </header>
        <div class="editor-meta">
          <div class="editor-meta-field">
            <span class="label">bpm</span>
            <input
              id="editor-bpm"
              type="number"
              step="0.01"
              min="40"
              max="208"
            />
          </div>
          <div class="editor-meta-field">
            <span class="label">grid offset</span>
            <span id="editor-grid-offset" class="value">0.000s</span>
          </div>
          <div class="editor-meta-field">
            <span class="label">duration</span>
            <span id="editor-duration" class="value">0:00</span>
          </div>
          <div class="editor-meta-field">
            <span class="label">confidence</span>
            <span id="editor-confidence" class="value">0.00</span>
          </div>
        </div>
        <div class="editor-canvas-wrap">
          <canvas id="editor-waveform"></canvas>
        </div>
        <p class="editor-help">
          wheel: zoom · rmb-drag: pan · lmb-click: play from here · lmb-drag: shift beat grid
        </p>
        <footer class="editor-footer">
          <button id="editor-cancel" type="button">cancel</button>
          <button id="editor-save" class="save-btn" type="button">save</button>
        </footer>
      </div>
    </div>
    <button id="menu-button" type="button" aria-label="menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="menu" class="hidden">
      <div class="user-modal">
        <nav class="user-tabs">
          <button class="user-tab active" type="button" data-tab="settings">settings</button>
          <button class="user-tab" type="button" data-tab="music">music</button>
          <button class="user-tab" type="button" data-tab="post" data-dev-only>post</button>
          <button class="user-tab" type="button" data-tab="dev" data-dev-only>dev</button>
        </nav>
        <div class="user-panes">
          <section class="user-pane active" data-pane="settings">
            <div class="post-panel">
              <div class="post-section-header">accessibility</div>
              <div class="post-row">
                <label for="toggle-invincible">invincibility</label>
                <button
                  id="toggle-invincible"
                  type="button"
                  class="settings-toggle"
                  aria-pressed="false"
                ></button>
              </div>
            </div>
          </section>
          <section class="user-pane" data-pane="music">
            <ul id="track-list" class="track-list">
              <li class="track-empty">no tracks loaded yet</li>
